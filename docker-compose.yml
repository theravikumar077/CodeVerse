version: '3.8'

services:
  database:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://database:27017/codeverse
      - JWT_SECRET=production_secret_39201923
      - NODE_ENV=production
      - WORKSPACE_DIR=/app/workspaces
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Mount Docker socket
      - workspaces_data:/app/workspaces
    depends_on:
      - database

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongodb_data:
  workspaces_data:
